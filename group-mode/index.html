<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSW DPS Calculator - Group Mode</title>
    <link rel="stylesheet" href="group-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>TSW DPS Calculator - Group Mode</h1>
            <p class="subtitle">Simulate damage for a 5-player group</p>
            <div class="mode-switch">
                <a href="../index.html" class="btn-secondary">Single Player Mode</a>
            </div>
        </header>

        <section class="panel glass-panel" id="group-settings-panel">
            <h2>Group Settings</h2>
            <div class="form-group">
                <label for="simulation-time">Simulation Timeframe (Minutes)</label>
                <input type="number" id="simulation-time" value="3" min="1" max="15">
            </div>
            <div class="form-group">
                <label for="target-enemy">Target Enemy</label>
                <select id="target-enemy">
                    <option value="training-puppet">Training Puppet</option>
                </select>
            </div>
            <div id="enemy-stats-display" class="enemy-stats">
                Block: 0 | Evade: 0 | Defense: 0
            </div>
        </section>

        <main class="group-main">
            <div id="players-container" class="players-grid">
                <!-- Player slots will be generated by JavaScript -->
            </div>
        </main>

        <section class="panel highlight-panel" id="group-results-panel">
            <h2>Group Damage Summary</h2>
            <div class="result-card">
                <div class="metrics">
                    <div class="metric total-dps-metric">
                        <span class="metric-label">Total Group DPS</span>
                        <span class="metric-value highlight" id="group-total-dps">0</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Average DPS per Player</span>
                        <span class="metric-value" id="average-dps">0</span>
                    </div>
                </div>

                <div class="player-breakdown" id="player-breakdown">
                    <!-- Individual player results will be shown here -->
                </div>

                <div class="action-buttons">
                    <button id="calculate-group-btn" class="btn-primary">Calculate Group DPS</button>
                    <button id="clear-all-btn" class="btn-secondary">Clear All Players</button>
                    <button id="export-group-btn" class="btn-secondary">Export Group Build</button>
                </div>

                <div class="form-group" style="margin-top: 1rem;">
                    <label for="import-group-textarea">
                        Import Group Build
                        <span style="font-size: 0.75rem; color: var(--text-secondary); margin-left: 0.5rem;">
                            Paste exported group data here
                        </span>
                    </label>
                    <textarea id="import-group-textarea" rows="8" 
                        style="width: 100%; resize: vertical; font-size: 0.8rem; font-family: monospace;"
                        placeholder="Paste exported group build data here..."></textarea>
                    <button id="import-group-btn" class="btn-primary" style="margin-top: 0.5rem;">
                        Import Group Build
                    </button>
                </div>
            </div>
        </section>
    </div>

    <script src="../data.js"></script>
    <script src="group-app.js"></script>
</body>

</html>
